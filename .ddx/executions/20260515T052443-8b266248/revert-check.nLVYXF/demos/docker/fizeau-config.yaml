# Fizeau config used inside the demos container.
# Points at the locally launched llama-server (entrypoint.sh starts it
# in the background on $LLAMA_PORT).
providers:
  local:
    type: openai
    base_url: http://127.0.0.1:8080/v1
    api_key: sk-no-key-required
    model: qwen2.5-coder-0.5b-instruct
    context_window: 4096
    max_tokens: 1024

default: local
