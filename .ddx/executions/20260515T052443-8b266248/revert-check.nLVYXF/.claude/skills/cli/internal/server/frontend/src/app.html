<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<title>DDx</title>
		<script>
			(() => {
				if (window.__ddxCommandPaletteBridgeInstalled) return;
				window.__ddxCommandPaletteBridgeInstalled = true;

				window.addEventListener(
					'keydown',
					(event) => {
						if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 'k') {
							event.preventDefault();
							window.__ddxCommandPalettePendingOpen = true;
							window.dispatchEvent(new CustomEvent('ddx-command-palette-open'));
						}

						if (event.key === 'Escape') {
							window.dispatchEvent(new CustomEvent('ddx-command-palette-close'));
						}
					},
					{ capture: true }
				);
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
