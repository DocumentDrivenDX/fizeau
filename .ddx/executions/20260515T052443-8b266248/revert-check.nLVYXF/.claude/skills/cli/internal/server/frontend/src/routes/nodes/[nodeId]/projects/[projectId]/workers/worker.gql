query WorkersByProject($projectID: String!) {
	workersByProject(projectID: $projectID, first: 50) {
		edges {
			node {
				id
				kind
				state
				status
				harness
				model
				currentBead
				attempts
				successes
				failures
				startedAt
			}
			cursor
		}
		pageInfo {
			hasNextPage
			endCursor
		}
		totalCount
	}
}

query WorkerDetail($id: ID!) {
	worker(id: $id) {
		id
		kind
		state
		status
		harness
		model
		effort
		once
		pollInterval
		startedAt
		finishedAt
		currentBead
		lastError
		attempts
		successes
		failures
		currentAttempt {
			attemptId
			beadId
			phase
			startedAt
			elapsedMs
		}
		recentEvents {
			kind
			text
			name
			inputs
			output
		}
	}
}

query WorkerLog($workerID: ID!) {
	workerLog(workerID: $workerID) {
		stdout
		stderr
	}
}
