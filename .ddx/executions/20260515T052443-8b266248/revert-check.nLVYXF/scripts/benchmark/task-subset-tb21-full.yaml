# TerminalBench 2.1 — full sweep subset
#
# Used in phases: local-qwen, sonnet-comparison, gpt-comparison.
# Stratified by category using fixed quotas analogous to the former TB-2.0
# evidence-grade subset, but drawn from the TB-2.1 catalog.
#
# Dataset: terminal-bench/terminal-bench-2-1
# Spec:    terminalbench-2.1-sweep-plan-2026-05-07 (phases: local-qwen, sonnet-comparison, gpt-comparison)
#
# Selection rule:
#  1. Start from terminal-bench/terminal-bench-2-1 task catalog.
#  2. Keep tasks with: cpus==1, memory=="2G", verifier_timeout<=1200,
#     agent_timeout<=1200, expert_time_estimate_min<=180, no no-verified-solution tag.
#  3. Stratify by category (quotas below). Within category: sort by difficulty
#     (hard, medium, easy) then task ID; take first N per quota.
#  4. Canary tasks are included in this subset.
#
# Quotas: SE=5, security=3, file-ops=2, sysadmin=2, data-processing=2, debugging=1
#
version: "1"
captured: "2026-05-07"
dataset: terminal-bench/terminal-bench-2-1
dataset_repo: https://github.com/laude-institute/terminal-bench-2-1
dataset_commit: "harbor-registry"
selection_rule: "filtered TB-2.1 tasks with fixed category quotas SE=5 security=3 file-ops=2 sysadmin=2 data-processing=2 debugging=1; difficulty-desc then id-asc"

tasks:
  # software-engineering (5)
  - id: cancel-async-tasks
    category: software-engineering
    difficulty: hard
    rationale: Async/debug-heavy code fix; exercises read, edit, and test loops.

  - id: build-pmars
    category: software-engineering
    difficulty: medium
    rationale: Build-oriented task that stresses shell discipline and targeted fixes.

  - id: code-from-image
    category: software-engineering
    difficulty: medium
    rationale: Mixed extraction and coding workflow; broadens beyond plain text edits.

  - id: git-leak-recovery
    category: software-engineering
    difficulty: medium
    rationale: Git-oriented remediation task aligned with repository tooling workflows.

  - id: headless-terminal
    category: software-engineering
    difficulty: medium
    rationale: Terminal-centric task that can expose shell exploration anti-patterns.

  # security (3)
  - id: fix-code-vulnerability
    category: security
    difficulty: hard
    rationale: High-signal secure-editing task; exercises read-understand-fix pattern under verifier pressure.

  - id: password-recovery
    category: security
    difficulty: hard
    rationale: Troubleshooting-heavy security task with file and shell interaction.

  - id: break-filter-js-from-html
    category: security
    difficulty: medium
    rationale: Smaller security task that helps detect regressions on easier remediation work.

  # file-operations (2)
  - id: db-wal-recovery
    category: file-operations
    difficulty: medium
    rationale: Recovery task with binary/file handling and verification pressure.

  - id: extract-elf
    category: file-operations
    difficulty: medium
    rationale: File-inspection task that stresses targeted reads over shell thrash.

  # system-administration (2)
  - id: configure-git-webserver
    category: system-administration
    difficulty: hard
    rationale: Short but high-signal config task that exercises precise shell usage.

  - id: git-multibranch
    category: system-administration
    difficulty: medium
    rationale: Multi-branch git workflow useful for navigation and command discipline.

  # data-processing (2)
  - id: log-summary-date-ranges
    category: data-processing
    difficulty: medium
    rationale: Text-processing/report task aligned with read-edit-run loops.

  - id: multi-source-data-merger
    category: data-processing
    difficulty: medium
    rationale: Multi-input merge task; stresses structured reasoning over bash search.

  # debugging (1)
  - id: qemu-startup
    category: system-administration
    difficulty: medium
    rationale: VM startup/debug task; preserves a debugging-style slot with a TB-2.1 task ID.
