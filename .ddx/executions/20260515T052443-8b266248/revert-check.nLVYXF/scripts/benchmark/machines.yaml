# Machine registry for self-hosted benchmark lanes.
#
# Profile YAMLs reference a machine via metadata.server (the hostname/server name).
# generate-report.py joins this file on that key to surface hardware on the
# profile cards in the HTML report and in data/machines.json.
#
# Cloud providers (openai, openrouter, anthropic) intentionally don't appear
# here — there's no machine to describe; they're treated as opaque endpoints.
#
# ---------------------------------------------------------------------------
# Schema (per machine).  All fields are optional; the renderer skips empties.
# ---------------------------------------------------------------------------
# Top-level (kept for backwards compatibility — existing entries still parse):
#   label    : short display name shown on the profile card
#   chassis  : enclosure / form factor (laptop, desktop, Mac Studio, …)
#   cpu      : CPU model (free text; superseded by hardware.cpu_model)
#   gpu      : GPU model + memory if discrete (superseded by hardware.gpu_*)
#   memory   : system RAM (free text; superseded by hardware.memory_gb)
#   os       : operating system + container/runtime layer
#   network  : how this machine is reached from the benchmark runner
#   notes    : free-form (role, quirks, what backends it hosts)
#   tdp_watts_configured      : actual operating power cap on this machine.
#                               Often well below the chip's hardware-profile
#                               tdp_watts_spec (e.g., NVIDIA cards run at a
#                               configured power-limit; laptop chassis run a
#                               balanced profile that throttles below max).
#                               Used by perf/W story-page comparisons in
#                               preference to the spec value.
#   tdp_watts_configured_note : free-form description of where the cap
#                               came from (nvidia-smi -pl, chassis profile,
#                               etc.) — appears in the methodology page.
#
# Extended sub-blocks (populated by capture-machine-info.sh, e.g. via
# `fastfetch --format json` on macOS or `fastfetch --format json` on
# Linux+WSL):
#   snapshot:
#     captured_at        : ISO-8601 UTC timestamp the snapshot was taken
#     hostname           : reported `hostname`
#     kernel             : `uname -sr`
#     os_release         : VERSION_ID (Linux) / build (macOS)
#   hardware:
#     cpu_model          : detected CPU brand string
#     cpu_cores          : logical CPU count
#     cpu_sockets        : physical socket count
#     memory_gb          : total system RAM, GB
#     gpu_vendor         : NVIDIA | Apple | AMD | …
#     gpu_model          : detected GPU/SoC name
#     gpu_vram_mb        : dedicated VRAM, MiB (0 for unified memory)
#     gpu_driver         : driver version (NVIDIA only)
#     gpu_runtime        : CUDA | ROCm | MLX/Metal
#     gpu_runtime_version: toolkit version
#     gpu_util_pct       : utilization snapshot %
#     gpu_mem_used_mb    : allocated VRAM at snapshot, MiB
#   network_detail:
#     primary_ip         : default-route source IP
#     tailscale_ip       : tailnet IPv4
#     public_ip          : opt-in (FETCH_PUBLIC_IP=1)
#   serving:
#     engine             : vllm | mlx | ollama | lmstudio | unknown
#     engine_version     : `<engine> --version`
#     endpoint           : base URL probed (http://127.0.0.1:PORT)
#     port               : numeric port
#     pid                : engine PID at snapshot
#     model_id           : id from /v1/models[0].id
#     quant_label        : AWQ | GPTQ | FP8 | INT4 | INT8 | BF16 (inferred)
#     weights_path       : path/root from /v1/models entry
#     context_window     : max_model_len / context_length
#     kv_cache           : free-text KV cache description (manual)
#     max_batch          : max concurrent batch (manual)
#     max_seq_len        : max sequence length (manual)
#   sampling_defaults:
#     temperature, top_p, top_k, repetition_penalty, max_tokens
#       — defaults the host serves with; record what your launcher passes.
#
# Leave fields empty when unknown — the renderer skips empty rows. Add new
# machines as they come online.
#
# ---------------------------------------------------------------------------
# Workflow for refreshing an entry
# ---------------------------------------------------------------------------
#   1. ssh <hostname>
#   2. cd path/to/fizeau    # or scp the script over
#   3. ./scripts/benchmark/capture-machine-info.sh > /tmp/me.yaml
#   4. scp <hostname>:/tmp/me.yaml ./me.yaml
#   5. Replace the existing block under that hostname in this file with the
#      generated YAML. Keep the original `label`, `chassis`, and `notes`
#      values unless they need updating — the script leaves them empty.
#   6. Commit.  generate-report.py prefers extended fields when present.
#
# Tip: `make capture-machine-info` runs the script locally on the build host
# (only useful when you're physically on the machine you want to inventory).

version: 1

# ---------------------------------------------------------------------------
# Hardware profile registry — reusable specs referenced by `machines.*.hardware_profile`.
# ---------------------------------------------------------------------------
# Each entry is a self-contained hardware description that may be shared
# across multiple machines (e.g. two Mac Studios with identical config).
# Profile YAMLs do not reference these directly; report generators join via
# the machine entry's `hardware_profile` field. Add a new profile here once
# and reuse — chip/memory specs change rarely compared to host turnover.
#
# Fields:
#   chip               : marketing chip name (apple-m2-ultra, nvidia-rtx-3090-ti, …)
#   chip_family        : coarse family (apple-silicon | nvidia-cuda | amd-rocm | cpu)
#   cores_cpu          : performance + efficiency cores combined
#   cores_gpu          : GPU/SoC GPU core count where meaningful
#   memory_gb          : total RAM (unified for Apple Silicon)
#   memory_type        : unified | discrete | system+vram
#   vram_gb            : dedicated VRAM (0 for unified)
#   tdp_watts_spec     : Vendor spec / theoretical max sustained board power
#                        for the chip. Used for context — never for perf/W
#                        comparisons. NVIDIA: published board power. Apple
#                        Silicon: empirical sustained measurement (Apple does
#                        not publish TDP). Leave blank when unknown.
#                        For PER-RUN actual power consumption, see the
#                        machine-level tdp_watts_configured (operational
#                        power cap, often well below spec) and the future
#                        per-run telemetry capture (TBD: nvidia-smi /
#                        powermetrics integration into harbor harness).
#   typical_backends   : informational — which inference backends this chip can serve
#   notes              : free-form
hardware_profiles:
  apple-m2-ultra-60gpu-192gb:
    chip: apple-m2-ultra
    chip_family: apple-silicon
    cores_cpu: 24                # 16 performance + 8 efficiency
    cores_gpu: 60                # M2 Ultra binned GPU variant (60-core; max bin is 76-core)
    memory_gb: 192
    memory_type: unified
    vram_gb: 0
    tdp_watts_spec: 200          # Mac Studio M2 Ultra sustained under heavy GPU load (Apple does not publish official TDP)
    typical_backends: [omlx, llama-server, ds4, lmstudio, lucebox, rapid-mlx]
    notes: >-
      Mac Studio Apple Silicon, M2 Ultra 60-core GPU bin with 192 GB
      unified memory. Unified memory lets the GPU address all 192 GB,
      so 200B-class models fit if quantized. Metal-only — no CUDA path.
      The 76-core GPU bin is also available with 192 GB; if a separate
      machine ships with that variant, add `apple-m2-ultra-76gpu-192gb`.

  nvidia-rtx-3090-ti-desktop:
    chip: nvidia-rtx-3090-ti
    chip_family: nvidia-cuda
    cores_cpu: 0                 # CPU host varies; track per-machine if needed
    cores_gpu: 0                 # Ampere SM count; fill in if it becomes load-bearing
    memory_gb: 0                 # system RAM tracked per-machine (varies)
    memory_type: system+vram
    vram_gb: 24
    tdp_watts_spec: 450          # NVIDIA spec board power (peak)
    typical_backends: [vllm, llama-server]
    notes: >-
      Desktop NVIDIA RTX 3090 Ti (Ampere, sm_86, 24 GB GDDR6X). Newer
      SM revision than 3090 non-Ti, similar VRAM. Reference Ampere lane.

  nvidia-rtx-5090-laptop:
    chip: nvidia-rtx-5090-laptop
    chip_family: nvidia-cuda
    cores_cpu: 0
    cores_gpu: 0
    memory_gb: 0
    memory_type: system+vram
    vram_gb: 24
    tdp_watts_spec: 175          # mobile cap; configurable per-chassis (Lenovo Legion 7i Pro)
    typical_backends: [vllm, llama-server]
    notes: >-
      Laptop RTX 5090 (Blackwell mobile, sm_120, 24 GB VRAM cap). Lower
      TDP / clocks than the desktop part; expect 60-80% of the desktop's
      throughput. TDP varies by chassis power profile; 175 W is the
      Lenovo Legion 7i Pro sustained max with combined CPU+GPU draw.

  apple-m1-max-64gb:
    chip: apple-m1-max
    chip_family: apple-silicon
    cores_cpu: 10                # 8 performance + 2 efficiency
    cores_gpu: 32                # M1 Max full GPU config (64 GB SKU is the 32-core bin)
    memory_gb: 64
    memory_type: unified
    vram_gb: 0
    tdp_watts_spec: 60           # MBP 14" M1 Max sustained under heavy GPU load (Apple does not publish official TDP)
    typical_backends: [omlx, llama-server, lmstudio, lucebox, rapid-mlx]
    notes: >-
      MacBook Pro 14" M1 Max with 64 GB unified memory. Smaller power
      envelope than M2 Ultra; useful as a portable Apple Silicon
      reference. Metal-only; ~400 GB/s memory bandwidth (vs ~800 GB/s
      on M2 Ultra).

