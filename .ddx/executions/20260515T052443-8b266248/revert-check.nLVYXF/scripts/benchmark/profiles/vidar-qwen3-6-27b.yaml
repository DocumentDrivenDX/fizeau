# Qwen3.6-27B-MLX-8bit via vidar omlx (local, port 1235). Free/local tier.
# No API key required — omlx serves OpenAI-compat without auth.
# Qwen3 thinking-mode recommended sampling: T=0.6, top_p=0.95, top_k=20.
id: vidar-qwen3-6-27b
metadata:
  model_family: qwen3-6-27b
  model_id: Qwen3.6-27B-MLX-8bit
  quant_label: mlx-8bit
  provider_surface: vidar-omlx
  runtime: omlx
  hardware_label: vidar-apple-m
  endpoint: http://vidar:1235/v1
  server: vidar

provider:
  type: omlx
  model: Qwen3.6-27B-MLX-8bit
  base_url: http://vidar:1235/v1
  api_key_env: OMLX_API_KEY
pricing:
  input_usd_per_mtok: 0.0
  output_usd_per_mtok: 0.0
  cached_input_usd_per_mtok: 0.0
limits:
  max_output_tokens: 65536               # bumped from 32768 — gives response room after Qwen's thinking section
  context_tokens: 128000
  rate_limit_rpm: 60
  rate_limit_tpm: 100000
# Budget = QWEN_BASE × LANE_PENALTY = 2.5 × 3.23 ≈ 8.0x.
#   QWEN_BASE = 2.5:  bounded from OR-Qwen's truncated-fail wall distribution
#                     (p95 ≈ 1832s, max ≈ 2025s vs harbor 900s task base) —
#                     ~2.3x rescues most truncated cells, +margin for safety.
#   LANE_PENALTY = 3.23x:  empirical p75 of median(local_pass_wall /
#                     OR_pass_wall) across joint-pass tasks (n=31 as of
#                     2026-05-11).
# Vidar's lane penalty is higher than sindri-llamacpp's 2.03x because oMLX
# 8-bit has worse TTFT (~10s vs sindri-llamacpp ~1s) and prefill (167 tok/s
# vs 329), which compound over multi-turn agent runs. Cells exit early on
# finish_reason=stop so over-provisioning has bounded cost.
agent_timeout_multiplier: 8.0
sampling:
  temperature: 0.6
  # Named tier — catalog owns the wire shape (ADR-010).
  # fizeau emits Anthropic-style `thinking: {type: enabled, budget_tokens:
  # 2048}` to oMLX (PortableBudgets low=2048). Reverted from
  # `reasoning: 4096` (explicit KindTokens) per ADR-010. Reminder: vidar's
  # active backend on port 1235 (oMLX) was retired on 2026-05-11 in favor
  # of ds4 on port 1236; this profile is kept for historical reruns.
  reasoning: low
  top_p: 0.95
  top_k: 20
versioning:
  resolved_at: "2026-04-30"
  snapshot: "Qwen3.6-27B-MLX-8bit"
