# Phase A.1 anchor profile. GPT-5-mini (OpenAI / GPT-5 family) via OpenRouter.
# Selected as anchor: strongest tool-use model in the ≤$3/Mtok output bracket
# with recency ≥ 2025-11-01. Pricing from OpenRouter list price 2026-04-30.
# SD-010 §6.3: cost reconciliation hashes this YAML per cell run.
id: gpt-5-mini
metadata:
  server: openrouter
  model_family: gpt-5-mini
  model_id: openai/gpt-5-mini
  quant_label: cloud-hosted
  provider_surface: openrouter
  runtime: openrouter

provider:
  type: openai-compat
  model: openai/gpt-5-mini
  base_url: https://openrouter.ai/api/v1
  api_key_env: OPENROUTER_API_KEY
pricing:
  input_usd_per_mtok: 0.25
  output_usd_per_mtok: 2.00
  cached_input_usd_per_mtok: 0.05
limits:
  max_output_tokens: 16384
  context_tokens: 400000
  rate_limit_rpm: 500
  rate_limit_tpm: 200000
sampling:
  temperature: 0.0
  reasoning: medium
versioning:
  resolved_at: "2026-04-30"
  snapshot: "openai/gpt-5-mini"
