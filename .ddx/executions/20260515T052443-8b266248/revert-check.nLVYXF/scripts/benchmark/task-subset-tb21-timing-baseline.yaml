# TerminalBench 2.1 — timing-baseline subset.
#
# 8 tasks hand-picked from OR-passing to span the OR pass-wall
# difficulty distribution (2 quick / 2 medium-low / 2 medium-high /
# 2 long). The intent is to land enough data to tune vidar-ds4's
# agent_timeout_multiplier (currently 5.0) before committing to a
# full 52-task or-passing sweep.
#
# Generated 2026-05-11 from observed OR-Qwen3.6-27B pass walls.
# Re-run the generator if those baselines drift materially.
#
version: "1"
captured: "2026-05-11"
dataset: terminal-bench/terminal-bench-2-1
dataset_repo: https://github.com/laude-institute/terminal-bench-2-1
dataset_commit: "harbor-registry"
selection_rule: "8 tasks spanning OR-Qwen pass-wall buckets for per-lane multiplier tuning"

tasks:
  - id: fix-git                                 # quick, OR p50_wall=115s
  - id: openssl-selfsigned-cert                 # quick, OR p50_wall=159s
  - id: prove-plus-comm                         # medium-low, OR p50_wall=204s
  - id: fix-code-vulnerability                  # medium-low, OR p50_wall=237s
  - id: polyglot-c-py                           # medium-high, OR p50_wall=668s
  - id: financial-document-processor            # medium-high, OR p50_wall=738s
  - id: reshard-c4-data                         # long, OR p50_wall=1466s
  - id: fix-ocaml-gc                            # long, OR p50_wall=1835s
