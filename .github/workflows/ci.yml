name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install quality tools
        run: |
          make install-quality-tools
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build
        run: make build-ci

      - name: Vet
        run: make vet

      - name: CONTRACT-004 import boundary
        run: make contract004-import-lint

      - name: Lint
        run: make lint-go

      - name: Security scan
        run: make gosec

      - name: Vulnerability scan
        run: make govulncheck

      - name: Format check
        run: make fmt-check

      - name: Rename noise check
        run: make rename-noise-check

      - name: Test
        run: make test-no-race

      - name: Test (race)
        run: make test-race
        if: runner.os == 'Linux'

  adapter-pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install pytest
        run: python -m pip install --upgrade pytest

      - name: Adapter pytest
        run: make adapter-pytest
