{{- /*
  runtime-props-grid — filterable/sortable table of per-profile runtime_props.

  Data source: website/static/benchmarks/runtime-props.json is read at Hugo
  build time via readFile and inlined as a <script type="application/json">
  block. No runtime fetch is needed, so the grid works from file:// URLs
  (tests) and offline.

  Falls back gracefully: rows without runtime_props render "—" in every
  props column; the grid works even when the props-capture bead has not
  landed yet.

  Columns:
    Profile, Provider, Extractor, Base model, Model quant, KV quant,
    Draft model, Draft mode, Max context, MTP enabled, Temp

  Filtering: per-column text inputs (string cols) / number range (max_context)
             / dropdown for boolean (mtp_enabled).
  Sorting:   click-to-sort on any header; shift-click for secondary sort.
  Mobile:    table is rp-table-wrap with overflow-x scroll, consistent with
             .br-body table in the site CSS.
*/ -}}

{{- $dataPath := "static/benchmarks/runtime-props.json" -}}
{{- $raw := readFile $dataPath -}}
{{- $data := $raw | transform.Unmarshal -}}

<div class="br-body" id="rp-grid-wrap">
  {{- if $data }}
  <div class="meta" id="rp-grid-status">{{ $data.generated_at }}{{ if $data.note }} · {{ $data.note }}{{ end }}</div>
  {{- else }}
  <div class="meta" id="rp-grid-status">Runtime properties data not available.</div>
  {{- end }}

  {{- if $data }}

  <div class="rp-filters" id="rp-filters">
    <div class="rp-filter-row">
      <label class="rp-filter-label">Profile <input class="rp-filter" data-col="0" type="text" placeholder="filter…"></label>
      <label class="rp-filter-label">Provider <input class="rp-filter" data-col="1" type="text" placeholder="filter…"></label>
      <label class="rp-filter-label">Extractor <input class="rp-filter" data-col="2" type="text" placeholder="filter…"></label>
      <label class="rp-filter-label">Base model <input class="rp-filter" data-col="3" type="text" placeholder="filter…"></label>
      <label class="rp-filter-label">Model quant <input class="rp-filter" data-col="4" type="text" placeholder="filter…"></label>
      <label class="rp-filter-label">KV quant <input class="rp-filter" data-col="5" type="text" placeholder="filter…"></label>
      <label class="rp-filter-label">Draft model <input class="rp-filter" data-col="6" type="text" placeholder="filter…"></label>
      <label class="rp-filter-label">Draft mode <input class="rp-filter" data-col="7" type="text" placeholder="filter…"></label>
      <label class="rp-filter-label">Max ctx ≥ <input class="rp-filter rp-filter--num" data-col="8" data-mode="gte" type="number" placeholder="0" min="0" step="1024"></label>
      <label class="rp-filter-label">MTP
        <select class="rp-filter rp-filter--select" data-col="9">
          <option value="">all</option>
          <option value="yes">yes</option>
          <option value="no">no</option>
        </select>
      </label>
      <label class="rp-filter-label">Temp ≤ <input class="rp-filter rp-filter--num" data-col="10" data-mode="lte" type="number" placeholder="any" min="0" step="0.1"></label>
    </div>
    <div class="rp-filter-actions">
      <button class="rp-btn" id="rp-clear-btn">Clear filters</button>
      <span class="rp-row-count" id="rp-row-count"></span>
    </div>
  </div>

  <div class="rp-table-wrap">
    <table class="rp-table" id="rp-table">
      <thead>
        <tr>
          <th class="rp-th" data-col="0" title="Click to sort; shift-click for secondary sort">Profile <span class="rp-sort-icon"></span></th>
          <th class="rp-th" data-col="1">Provider <span class="rp-sort-icon"></span></th>
          <th class="rp-th" data-col="2">Extractor <span class="rp-sort-icon"></span></th>
          <th class="rp-th" data-col="3">Base model <span class="rp-sort-icon"></span></th>
          <th class="rp-th" data-col="4">Model quant <span class="rp-sort-icon"></span></th>
          <th class="rp-th" data-col="5">KV quant <span class="rp-sort-icon"></span></th>
          <th class="rp-th" data-col="6">Draft model <span class="rp-sort-icon"></span></th>
          <th class="rp-th" data-col="7">Draft mode <span class="rp-sort-icon"></span></th>
          <th class="rp-th" data-col="8">Max ctx <span class="rp-sort-icon"></span></th>
          <th class="rp-th" data-col="9">MTP <span class="rp-sort-icon"></span></th>
          <th class="rp-th" data-col="10">Temp <span class="rp-sort-icon"></span></th>
        </tr>
      </thead>
      <tbody id="rp-tbody"></tbody>
    </table>
  </div>

  <script type="application/json" id="rp-data">{{ $raw | safeJS }}</script>

  <script>
  (function () {
    'use strict';

    var raw = document.getElementById('rp-data').textContent;
    var data;
    try { data = JSON.parse(raw); } catch(e) { return; }

    var tbodyEl = document.getElementById('rp-tbody');
    var countEl = document.getElementById('rp-row-count');
    var clearBtn = document.getElementById('rp-clear-btn');

    /* Sort state: [{col, dir}] — primary is [0], secondary is [1] */
    var sortKeys = [];
    /* Row data — each element is an array of 11 display strings */
    var allRows = [];
    /* Filter values per column */
    var filters = {};

    function cellVal(row, rp, col) {
      switch (col) {
        case 0: return row.label || row.profile_id || '';
        case 1: return row.provider || '';
        case 2: return rp ? (rp.extractor || '') : '';
        case 3: return rp ? (rp.base_model || '') : '';
        case 4: return rp ? (rp.model_quant || '') : '';
        case 5: return rp ? (rp.kv_quant || '') : '';
        case 6: return rp ? (rp.draft_model || '') : '';
        case 7: return rp ? (rp.draft_mode || '') : '';
        case 8: return rp && rp.max_context != null ? String(rp.max_context) : '';
        case 9: return rp && rp.mtp_enabled != null ? (rp.mtp_enabled ? 'yes' : 'no') : '';
        case 10: return rp && rp.sampling_defaults && rp.sampling_defaults.temperature != null
          ? String(rp.sampling_defaults.temperature) : '';
        default: return '';
      }
    }

    (data.rows || []).forEach(function (row) {
      var rp = row.runtime_props || null;
      var cells = [];
      for (var c = 0; c < 11; c++) { cells.push(cellVal(row, rp, c)); }
      allRows.push(cells);
    });

    /* ---------- render ---------- */
    function render() {
      var visible = applyFilter(allRows.slice());
      applySort(visible);
      tbodyEl.innerHTML = '';
      visible.forEach(function (cells) {
        var tr = document.createElement('tr');
        cells.forEach(function (val) {
          var td = document.createElement('td');
          td.textContent = val === '' ? '—' : val;
          if (val === '') td.className = 'rp-null';
          tr.appendChild(td);
        });
        tbodyEl.appendChild(tr);
      });
      countEl.textContent = visible.length + ' of ' + allRows.length + ' profiles';
      updateSortIcons();
    }

    /* ---------- filter ---------- */
    function applyFilter(rows) {
      var colKeys = Object.keys(filters);
      if (!colKeys.length) return rows;
      return rows.filter(function (cells) {
        return colKeys.every(function (colStr) {
          var col = parseInt(colStr, 10);
          var fv = filters[colStr];
          if (fv === '' || fv === null || fv === undefined) return true;
          var cellStr = cells[col];
          var filterEl = document.querySelector('.rp-filter[data-col="' + col + '"]');
          var mode = filterEl ? filterEl.dataset.mode : null;

          if (mode === 'gte') {
            if (cellStr === '') return false;
            return parseFloat(cellStr) >= parseFloat(fv);
          }
          if (mode === 'lte') {
            if (cellStr === '') return false;
            return parseFloat(cellStr) <= parseFloat(fv);
          }
          if (filterEl && filterEl.tagName === 'SELECT') {
            return cellStr === fv;
          }
          if (cellStr === '') return false;
          return cellStr.toLowerCase().indexOf(fv.toLowerCase()) !== -1;
        });
      });
    }

    /* ---------- sort ---------- */
    function applySort(rows) {
      if (!sortKeys.length) return;
      rows.sort(function (a, b) {
        for (var ki = 0; ki < sortKeys.length; ki++) {
          var col = sortKeys[ki].col;
          var dir = sortKeys[ki].dir;
          var av = a[col];
          var bv = b[col];
          if (av === '' && bv === '') continue;
          if (av === '') return 1;
          if (bv === '') return -1;
          var cmp;
          if (col === 8 || col === 10) {
            cmp = parseFloat(av) - parseFloat(bv);
          } else {
            cmp = av < bv ? -1 : (av > bv ? 1 : 0);
          }
          if (cmp !== 0) return dir === 'asc' ? cmp : -cmp;
        }
        return 0;
      });
    }

    /* ---------- sort icon update ---------- */
    function updateSortIcons() {
      document.querySelectorAll('.rp-th').forEach(function (th) {
        var col = parseInt(th.dataset.col, 10);
        var icon = th.querySelector('.rp-sort-icon');
        if (!icon) return;
        var idx = -1;
        for (var i = 0; i < sortKeys.length; i++) {
          if (sortKeys[i].col === col) { idx = i; break; }
        }
        if (idx < 0) { icon.textContent = ''; return; }
        var isPrimary = idx === 0;
        icon.textContent = sortKeys[idx].dir === 'asc'
          ? (isPrimary ? ' ↑' : ' ⇧')
          : (isPrimary ? ' ↓' : ' ⇩');
      });
    }

    /* ---------- event: header click ---------- */
    document.querySelectorAll('.rp-th').forEach(function (th) {
      th.style.cursor = 'pointer';
      th.addEventListener('click', function (e) {
        var col = parseInt(th.dataset.col, 10);
        var existing = -1;
        for (var i = 0; i < sortKeys.length; i++) {
          if (sortKeys[i].col === col) { existing = i; break; }
        }
        if (e.shiftKey) {
          if (existing >= 0) {
            if (sortKeys[existing].dir === 'asc') sortKeys[existing].dir = 'desc';
            else sortKeys.splice(existing, 1);
          } else {
            sortKeys.push({ col: col, dir: 'asc' });
          }
        } else {
          if (existing === 0) {
            sortKeys[0].dir = sortKeys[0].dir === 'asc' ? 'desc' : 'asc';
            sortKeys = sortKeys.slice(0, 2);
          } else {
            var secondary = sortKeys.filter(function (k) { return k.col !== col; }).slice(0, 1);
            sortKeys = [{ col: col, dir: 'asc' }].concat(secondary);
          }
        }
        render();
      });
    });

    /* ---------- event: filter inputs ---------- */
    document.querySelectorAll('.rp-filter').forEach(function (inp) {
      function update() {
        filters[inp.dataset.col] = inp.value;
        render();
      }
      inp.addEventListener('input', update);
      inp.addEventListener('change', update);
    });

    /* ---------- event: clear ---------- */
    clearBtn.addEventListener('click', function () {
      filters = {};
      document.querySelectorAll('.rp-filter').forEach(function (inp) { inp.value = ''; });
      render();
    });

    /* initial render */
    render();
  })();
  </script>

  {{- end }}
</div>
