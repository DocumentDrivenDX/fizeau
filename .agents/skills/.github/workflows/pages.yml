name: Deploy Website to GitHub Pages

on:
  workflow_run:
    workflows: ["CI", "Regenerate Demos"]
    types: [completed]
    branches: [main]
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    env:
      HUGO_VERSION: "0.159.2"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Hugo
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'cli/go.mod'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Inject version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p website/data
          echo "version: \"$VERSION\"" > website/data/release.yaml
          echo "tag: \"$GITHUB_REF_NAME\"" >> website/data/release.yaml

      - name: Build with Hugo
        working-directory: website
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: America/New_York
        run: |
          hugo \
            --gc \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Install website test dependencies
        working-directory: website
        run: npm ci

      - name: Build local test site
        working-directory: website
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache_test
          HUGO_ENVIRONMENT: production
          TZ: America/New_York
        run: |
          hugo \
            --gc \
            --minify \
            --destination public-test \
            --baseURL "http://127.0.0.1:1313/"

      - name: Install Playwright browsers
        working-directory: website
        run: npx playwright install --with-deps chromium

      - name: Run website Playwright checks
        working-directory: website
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:1313
          PLAYWRIGHT_WEB_SERVER_COMMAND: python3 -m http.server 1313 --directory public-test
          PLAYWRIGHT_WEB_SERVER_PORT: '1313'
        run: npm run test:e2e

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
