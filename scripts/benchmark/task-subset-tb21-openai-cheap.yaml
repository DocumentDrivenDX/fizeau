# TerminalBench 2.1 — cheap OpenAI GPT-5.5 subset
#
# Purpose: Keep native OpenAI GPT-5.5 validation affordable while preserving
# enough task variety to catch obvious regressions. Selection prefers observed
# GPT-5.5 run costs from 2026-05-08. For tasks without usable GPT-5.5 samples,
# selection uses OpenRouter Qwen3.6 27B token counts priced at GPT-5.5 rates:
# input=$5/MTok, output=$30/MTok. Avoid known multi-dollar cells.
#
# Expected cost at 5 reps, from observed/proxy averages: roughly $40-60. This
# is an estimate, not a cap; use --per-run-budget-usd for hard per-cell limits.

version: "1"
captured: "2026-05-08"
dataset: terminal-bench/terminal-bench-2-1
dataset_repo: https://github.com/laude-institute/terminal-bench-2-1
dataset_commit: "harbor-registry"
selection_rule: "observed native OpenAI GPT-5.5 average cost <= ~$0.90 per run where available; otherwise OpenRouter Qwen3.6 27B token count projected at GPT-5.5 pricing <= ~$0.60 per run; exclude known multi-dollar cells"

tasks:
