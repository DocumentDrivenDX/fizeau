# fiz wrapper lane for Codex subscription GPT 5.4 mini. The runner keeps the
# Harbor agent fixed at fiz; FIZEAU_HARNESS=codex selects the delegated harness
# execution path.
id: fiz-harness-codex-gpt-5-4-mini
provider:
  type: openrouter
  model: gpt-5.4-mini
  base_url: https://openrouter.ai/api/v1
  api_key_env: OPENROUTER_API_KEY
pricing:
  input_usd_per_mtok: 0.75
  output_usd_per_mtok: 4.50
  cached_input_usd_per_mtok: 0.075
limits:
  max_output_tokens: 128000
  context_tokens: 400000
  rate_limit_rpm: 500
  rate_limit_tpm: 200000
sampling:
  temperature: 0.0
  reasoning: medium
versioning:
  resolved_at: "2026-05-07"
  snapshot: "Codex subscription GPT alias"
