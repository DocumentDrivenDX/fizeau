# Sindri Lucebox DFlash speculative decoder serving Qwen3.6-27B-Q4_K_M.
#
# This is the benchmark profile for the lucebox-hub DFlash runtime on sindri.
# The live API exposes the served model alias `luce-dflash`; the target and
# draft weights are recorded below for provenance.
# The endpoint should be re-verified before long sweeps.
id: sindri-lucebox
harness: none
surface: fiz_provider_native
concurrency_group: sindri-lucebox-dflash
metadata:
  model_family: qwen3-6-27b
  model_id: luce-dflash
  target_model_repo: unsloth/Qwen3.6-27B-GGUF
  target_model_file: Qwen3.6-27B-Q4_K_M.gguf
  draft_model_repo: z-lab/Qwen3.6-27B-DFlash
  draft_model_file: model.safetensors
  quant_label: gguf-q4-k-m
  provider_surface: sindri-lucebox
  runtime: lucebox-dflash
  server: sindri

provider:
  type: lucebox
  model: luce-dflash
  base_url: http://sindri:8080/v1
  api_key_env: LUCEBOX_API_KEY
pricing:
  input_usd_per_mtok: 0.0
  output_usd_per_mtok: 0.0
  cached_input_usd_per_mtok: 0.0
limits:
  max_output_tokens: 32768
  context_tokens: 131072
  rate_limit_rpm: 60
  rate_limit_tpm: 100000
sampling:
  temperature: 0.6
  reasoning: off
  top_p: 0.95
  top_k: 20
versioning:
  resolved_at: "2026-05-13"
  snapshot: >-
    lucebox-hub dflash speculative decoder | served_model=luce-dflash
    | target=unsloth/Qwen3.6-27B-GGUF:Qwen3.6-27B-Q4_K_M.gguf
    | draft=z-lab/Qwen3.6-27B-DFlash:model.safetensors
    | hw=sindri-3090-ti | endpoint=http://sindri:8080/v1

# Start with the same conservative multiplier as the other slow local lanes.
# Re-tune once enough joint-pass TB-2.1 cells exist for a lane-specific p95.
agent_timeout_multiplier: 5.0
