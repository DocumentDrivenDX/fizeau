# DeepSeek V4 Flash via DwarfStar 4 (antirez/ds4) on vidar, port 1236.
# Replaces the prior vidar oMLX 8-bit Qwen3.6-27B lane on 2026-05-11.
#
# Active GGUF (from vidar's run-ds4.sh):
#   DeepSeek-V4-Flash-IQ2XXS-w2Q2K-AProjQ8-SExpQ8-OutQ8-chat-v2.gguf
# A heavily-quantized mixed-precision build:
#   - IQ2XXS (~2-bit super-super-small) for the bulk of the weights
#   - w2 layers at Q2_K (2-bit K-quant)
#   - Attention projection at Q8
#   - Shared experts at Q8
#   - Output layer at Q8
#   - chat-v2 fine-tune lineage
# This is materially different from antirez's reference deepseek-v4-gguf
# repo (full precision); pass-rate comparisons against the upstream model
# should note the lossy quant.
#
# Server config (from run-ds4.sh): --metal backend, --ctx 393216,
# --tokens 393216, --kv-disk-dir on Samsung SSD with 128 GB allowance,
# --warm-weights at startup (the 10-minute pre-warm we observed).
#
# ds4 is single-graph-worker (no batching, no slots, no /metrics), so
# fizeau's max_concurrency for this resource group is 1 and the
# utilization probe is liveness-only via GET /v1/models. The server
# ignores API keys — any non-empty value is accepted.
id: vidar-ds4
metadata:
  model_family: deepseek-v4-flash
  model_id: deepseek-v4-flash               # API id (sent in request); maps to the GGUF below at server side
  gguf_filename: DeepSeek-V4-Flash-IQ2XXS-w2Q2K-AProjQ8-SExpQ8-OutQ8-chat-v2.gguf
  quant_label: gguf-iq2xxs-mixed-q2k-q8       # heavily quantized: ~2-bit core, Q8 attention/output/shared-experts
  provider_surface: vidar-ds4
  runtime: ds4
  backend: metal                             # ds4-server --metal (Apple Silicon GPU)
  kv_disk_dir: /Volumes/Samsung/ds4-kv
  kv_disk_space_mb: 131072                   # 128 GB on-disk KV cache budget
  hardware_label: vidar-m2-ultra-192gb
  # Hardware specs live in scripts/benchmark/machines.yaml under
  # machines.vidar.hardware_profile=apple-m2-ultra-192gb (CPU/GPU cores,
  # memory, backends). The hardware_label here is a stable lane-side
  # identifier; the snapshot string below carries the hw label for
  # per-cell denormalized lookup.
  endpoint: http://vidar:1236/v1
  server: vidar

provider:
  type: ds4
  model: deepseek-v4-flash
  base_url: http://vidar:1236/v1
  api_key_env: DS4_API_KEY               # server ignores it; clients just need to send *something*
pricing:
  input_usd_per_mtok: 0.0
  output_usd_per_mtok: 0.0
  cached_input_usd_per_mtok: 0.0
limits:
  max_output_tokens: 32768
  context_tokens: 393216                 # server was started with --ctx 393216 (verified via /v1/models)
  rate_limit_rpm: 60
  rate_limit_tpm: 100000
sampling:
  temperature: 0.6
  # Named tier — catalog owns the wire shape (ADR-010).
  # fizeau emits Anthropic-style `thinking: {type: enabled, budget_tokens:
  # 2048}` to ds4 (which speaks the Anthropic Messages API alongside
  # OpenAI's). PortableBudgets low=2048. Reverted from `reasoning: 4096`
  # (explicit KindTokens) per ADR-010.
  reasoning: low
  top_p: 0.95
  top_k: 20
versioning:
  resolved_at: "2026-05-11"
  # ds4 doesn't expose a version, GGUF hash, or KV-cache state via any
  # HTTP endpoint, so we stamp the full provenance string manually. The
  # matrix runner copies this verbatim into every report.json's
  # profile_snapshot field — searching cells by snapshot string is the
  # only reliable way to slice results by build / model / cache config.
  #
  # Update this string whenever ANY of the following change:
  #   - ds4 server binary (antirez/ds4 commit)
  #   - GGUF filename (quant variant or fine-tune)
  #   - KV-disk path or budget (affects cache-warm behavior)
  #
  # Source: https://github.com/antirez/ds4/commit/ae302c2fa18cc6d9aefc021d0f27ae03c9ad2fc0
  snapshot: >-
    deepseek-v4-flash via ds4-server antirez/ds4@ae302c2f
    | gguf=DeepSeek-V4-Flash-IQ2XXS-w2Q2K-AProjQ8-SExpQ8-OutQ8-chat-v2.gguf
    | hw=apple-m2-ultra-192gb
    | backend=metal
    | kv_disk=/Volumes/Samsung/ds4-kv@131072MB
    | ctx=393216

# DeepSeek V4 Flash is a 284B-param MoE — substantially larger than Qwen3.6-
# 27B. The QWEN_BASE × LANE_PENALTY formula doesn't apply directly because
# we don't have joint-pass wall data for deepseek-v4-flash on TB-2.1 yet.
# Start with a conservative 5.0x (between sindri-llamacpp's 5.0 and vidar's
# old 8.0); re-tune after the first batch of joint-pass cells lands. ds4's
# single-graph-worker serialization means the multiplier directly bounds
# wall, no batching headroom to recover.
agent_timeout_multiplier: 5.0
