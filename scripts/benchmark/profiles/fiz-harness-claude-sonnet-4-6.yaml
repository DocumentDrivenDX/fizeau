# fiz wrapper lane for Claude Code subscription Sonnet. The benchmark runner
# keeps the Harbor installed agent fixed at fiz; FIZEAU_HARNESS=claude selects
# the delegated harness execution path.
id: fiz-harness-claude-sonnet-4-6
provider:
  type: openrouter
  model: claude-sonnet-4-6
  base_url: https://openrouter.ai/api/v1
  api_key_env: OPENROUTER_API_KEY
pricing:
  input_usd_per_mtok: 3.00
  output_usd_per_mtok: 15.00
  cached_input_usd_per_mtok: 0.30
limits:
  max_output_tokens: 128000
  context_tokens: 1000000
  rate_limit_rpm: 500
  rate_limit_tpm: 200000
sampling:
  temperature: 0.0
versioning:
  resolved_at: "2026-05-07"
  snapshot: "Claude Code subscription sonnet alias"
