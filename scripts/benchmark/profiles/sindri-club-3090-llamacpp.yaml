# Qwen3.6-27B Unsloth Q3_K_XL GGUF via llama.cpp's llama-server on sindri,
# port 8020 (re-using the port the vLLM build previously held).
# Switched from vLLM autoround on 2026-05-10 because the vLLM engine
# repeatedly stalled mid-generation (model never streamed tokens after
# accepting requests, wasted full agent budget). The vLLM lane profile
# at sindri-club-3090.yaml is kept alongside for historical comparison
# but should not run concurrently — both share the same hardware/port.
id: sindri-club-3090-llamacpp
metadata:
  model_family: qwen3-6-27b
  model_id: Qwen3.6-27B-UD-Q3_K_XL.gguf
  quant_label: gguf-q3-k-xl-unsloth
  provider_surface: sindri-club-llamacpp
  runtime: llama-server
  hardware_label: sindri-club-3090
  endpoint: http://sindri:8020/v1
  server: sindri

provider:
  type: llama-server
  model: Qwen3.6-27B-UD-Q3_K_XL.gguf
  base_url: http://sindri:8020/v1
  api_key_env: LLAMACPP_API_KEY
pricing:
  input_usd_per_mtok: 0.0
  output_usd_per_mtok: 0.0
  cached_input_usd_per_mtok: 0.0
limits:
  max_output_tokens: 32768
  context_tokens: 180000
  rate_limit_rpm: 60
  rate_limit_tpm: 100000
sampling:
  temperature: 0.6
  top_p: 0.95
  top_k: 20
# NOTE: no `reasoning:` field. Fiz's llama-server provider rejects the
# OpenAI-style `reasoning_effort` parameter ("reasoning=... is not
# supported by provider type llama-server"). Qwen3 thinking mode is
# instead controlled by llama-server's chat template (the
# generation_prompt determines whether <think> tags are open or closed
# at generation start). Sindri's current llama-server reports
# reasoning_format=none and generation_prompt="<think>\n\n</think>\n\n"
# (closed = no thinking).
versioning:
  resolved_at: "2026-05-10"
  snapshot: "Qwen3.6-27B-UD-Q3_K_XL.gguf"

# Budget = QWEN_BASE × LANE_PENALTY = 2.5 × 2.03 ≈ 5.0x.
#   QWEN_BASE = 2.5:  bounded from OR-Qwen's truncated-fail wall distribution
#                     (p95 ≈ 1832s, max ≈ 2025s vs harbor 900s task base) —
#                     ~2.3x rescues most truncated cells, +margin for safety.
#   LANE_PENALTY = 2.03x:  empirical p75 of median(local_pass_wall /
#                     OR_pass_wall) across joint-pass tasks (n=11 as of
#                     2026-05-11). Empirical and well-bounded — sindri-
#                     llamacpp's observed lane behavior on tasks both lanes
#                     pass.
# Decode rate is ~14 tok/s vs OR ~52, but empirical lane penalty is small
# because tool-exec dominates wall on most TB tasks (LLM is a small slice
# of total wall on tool-heavy tasks). Cells exit early on finish_reason=stop
# so over-provisioning has bounded cost.
agent_timeout_multiplier: 5.0
