# Qwen3 thinking-mode recommended sampling: T=0.6, top_p=0.95, top_k=20.
id: fiz-openrouter-qwen3-6-27b
metadata:
  model_family: qwen3-6-27b
  model_id: qwen/qwen3.6-27b
  quant_label: cloud-hosted
  provider_surface: openrouter
  runtime: openrouter
  server: openrouter

provider:
  type: openrouter
  model: qwen/qwen3.6-27b
  base_url: https://openrouter.ai/api/v1
  api_key_env: OPENROUTER_API_KEY
pricing:
  input_usd_per_mtok: 0.32
  output_usd_per_mtok: 3.20
  cached_input_usd_per_mtok: 0.32
limits:
  max_output_tokens: 32768
  context_tokens: 262144
  rate_limit_rpm: 500
  rate_limit_tpm: 1000000
sampling:
  temperature: 0.6
  reasoning: low
  top_p: 0.95
  top_k: 20
versioning:
  resolved_at: "2026-05-08"
  snapshot: "qwen/qwen3.6-27b via OpenRouter /api/v1/models"

# QWEN_BASE: amount of extra wall budget Qwen3.6-27B-the-model needs over
# the harbor-default per-task agent.timeout_sec to converge. 48% of OR-Qwen's
# real graded_fails at 1.0x are truncated mid-work (terminated_mid_work=True);
# the truncated walls cluster at p90=1832s, max=2025s vs harbor's median 900s
# task base. 2.5x rescues p95 truncations with a small safety margin.
#
# This is the BASE term in the per-lane formula:
#   multiplier = QWEN_BASE × LANE_PENALTY
# where LANE_PENALTY=1.0 for cloud OR (the reference lane). For local lanes
# (sindri-llamacpp, vidar) the same QWEN_BASE compounds with a slowdown
# factor empirically derived from joint-pass walls.
agent_timeout_multiplier: 2.5
