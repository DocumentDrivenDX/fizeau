# Qwen3.6-27B-MLX-8bit via vidar omlx (local, port 1235). Free/local tier.
# No API key required — omlx serves OpenAI-compat without auth.
# Qwen3 thinking-mode recommended sampling: T=0.6, top_p=0.95, top_k=20.
id: vidar-qwen3-6-27b
metadata:
  model_family: qwen3-6-27b
  model_id: Qwen3.6-27B-MLX-8bit
  quant_label: mlx-8bit
  provider_surface: vidar-omlx
  runtime: omlx
  hardware_label: vidar-apple-m
  endpoint: http://vidar:1235/v1
  server: vidar

provider:
  type: omlx
  model: Qwen3.6-27B-MLX-8bit
  base_url: http://vidar:1235/v1
  api_key_env: OMLX_API_KEY
pricing:
  input_usd_per_mtok: 0.0
  output_usd_per_mtok: 0.0
  cached_input_usd_per_mtok: 0.0
limits:
  max_output_tokens: 32768
  context_tokens: 128000
  rate_limit_rpm: 60
  rate_limit_tpm: 100000
# Budget derived from OR's observed passing walls on the 52-task or-passing
# subset. OR p90 pass-wall = 1066s; vidar throughput ratio ~3.5x (oMLX
# 8-bit ~15 tok/s vs OR ~52 tok/s) ⇒ target per-cell budget ~3731s.
# Divided by median harbor task base (900s) ⇒ ~4.1x → rounded to 3.0x
# since most tasks have base <= 900s and the multiplier-based cap over-
# provisions long-base tasks. Bump back up if truncation rate exceeds 15%.
#
# Earlier tuning (3.7x) was derived from per-task wall_local/wall_OR
# ratios on jointly-passed cells of the FULL 89-task subset, which
# included tasks where Qwen never converges and budget was wasted on
# thrash. Switching to or-passing eliminates those tasks.
agent_timeout_multiplier: 3.0
sampling:
  temperature: 0.6
  reasoning: low
  top_p: 0.95
  top_k: 20
versioning:
  resolved_at: "2026-04-30"
  snapshot: "Qwen3.6-27B-MLX-8bit"
