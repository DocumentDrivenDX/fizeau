# Qwen3.6-27B-MLX-8bit via vidar omlx (local, port 1235). Free/local tier.
# No API key required — omlx serves OpenAI-compat without auth.
# Qwen3 thinking-mode recommended sampling: T=0.6, top_p=0.95, top_k=20.
id: vidar-qwen3-6-27b
metadata:
  model_family: qwen3-6-27b
  model_id: Qwen3.6-27B-MLX-8bit
  quant_label: mlx-8bit
  provider_surface: vidar-omlx
  runtime: omlx
  hardware_label: vidar-apple-m
  endpoint: http://vidar:1235/v1
  server: vidar

provider:
  type: omlx
  model: Qwen3.6-27B-MLX-8bit
  base_url: http://vidar:1235/v1
  api_key_env: OMLX_API_KEY
pricing:
  input_usd_per_mtok: 0.0
  output_usd_per_mtok: 0.0
  cached_input_usd_per_mtok: 0.0
limits:
  max_output_tokens: 32768
  context_tokens: 128000
  rate_limit_rpm: 60
  rate_limit_tpm: 100000
# Scale harbor's per-task agent timeout. Computed as p95 of per-task
# wall_local/wall_OR on jointly-passed TB-2.1 tasks (n=27): p50=2.14,
# p75=3.27, p95=3.72. oMLX 8-bit decode at ~15 tok/s vs OR cloud Qwen at
# ~52 tok/s drives the gap. The default 1.0 multiplier produces ~47%
# mid-tool-call truncation on this lane (see `n_truncated` in matrix
# data); 3.7x should collapse that. The HARBOR_AGENT_TIMEOUT_MULTIPLIER
# env var overrides this.
agent_timeout_multiplier: 3.7
sampling:
  temperature: 0.6
  reasoning: low
  top_p: 0.95
  top_k: 20
versioning:
  resolved_at: "2026-04-30"
  snapshot: "Qwen3.6-27B-MLX-8bit"
