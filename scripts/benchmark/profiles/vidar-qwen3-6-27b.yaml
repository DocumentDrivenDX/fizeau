# Qwen3.6-27B-MLX-8bit via vidar omlx (local, port 1235). Free/local tier.
# No API key required — omlx serves OpenAI-compat without auth.
# Qwen3 thinking-mode recommended sampling: T=0.6, top_p=0.95, top_k=20.
id: vidar-qwen3-6-27b
metadata:
  model_family: qwen3-6-27b
  model_id: Qwen3.6-27B-MLX-8bit
  quant_label: mlx-8bit
  provider_surface: vidar-omlx
  runtime: omlx
  hardware_label: vidar-apple-m
  endpoint: http://vidar:1235/v1
  server: vidar

provider:
  type: omlx
  model: Qwen3.6-27B-MLX-8bit
  base_url: http://vidar:1235/v1
  api_key_env: OMLX_API_KEY
pricing:
  input_usd_per_mtok: 0.0
  output_usd_per_mtok: 0.0
  cached_input_usd_per_mtok: 0.0
limits:
  max_output_tokens: 32768
  context_tokens: 128000
  rate_limit_rpm: 60
  rate_limit_tpm: 100000
# Budget = QWEN_BASE × LANE_PENALTY = 3.0 × 3.23 ≈ 10.0x.
#   QWEN_BASE = 3.0:  empirical estimate that cloud OR-Qwen3.6-27B itself
#                     truncates ~48% of its real fails at the harbor 1.0x
#                     default — Qwen as a model needs ~3x base to converge.
#   LANE_PENALTY = 3.23x:  p75 of median(local_pass_wall / OR_pass_wall)
#                     across joint-pass tasks (n=31 as of 2026-05-11).
# Vidar's p75 penalty is significantly higher than sindri-llamacpp's 2.03x
# because oMLX 8-bit has worse TTFT (~10s vs sindri-llamacpp ~1s), which
# adds up over multi-turn agent runs. Over-provisioning is cheap: cells
# that don't need the headroom exit early on finish_reason=stop.
agent_timeout_multiplier: 10.0
sampling:
  temperature: 0.6
  reasoning: low
  top_p: 0.95
  top_k: 20
versioning:
  resolved_at: "2026-04-30"
  snapshot: "Qwen3.6-27B-MLX-8bit"
