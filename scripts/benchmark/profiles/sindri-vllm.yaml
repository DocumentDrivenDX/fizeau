# Qwen3.6-27B AutoRound via vLLM on sindri (RTX 3090, port 8020).
# Verified /v1/models on 2026-05-07: qwen3.6-27b-autoround.
id: sindri-vllm
metadata:
  model_family: qwen3-6-27b
  model_id: qwen3.6-27b-autoround
  quant_label: vllm-autoround
  provider_surface: sindri-vllm
  runtime: vllm
  server: sindri

provider:
  type: vllm
  model: qwen3.6-27b-autoround
  base_url: http://sindri:8020/v1
  api_key_env: VLLM_API_KEY
pricing:
  input_usd_per_mtok: 0.0
  output_usd_per_mtok: 0.0
  cached_input_usd_per_mtok: 0.0
limits:
  max_output_tokens: 32768
  context_tokens: 180000
  rate_limit_rpm: 60
  rate_limit_tpm: 100000
# Scale harbor's per-task agent timeout. Computed as p95 of per-task
# wall_local/wall_OR on jointly-passed TB-2.1 tasks (n=26): p50=1.69,
# p75=1.86, p95=2.68. The default 1.0 multiplier produces ~28% mid-tool-
# call truncation on this lane (see `n_truncated` in matrix data); 2.7x
# should collapse that. Bump if subsequent sweeps still show >10%
# truncation. The HARBOR_AGENT_TIMEOUT_MULTIPLIER env var overrides this.
agent_timeout_multiplier: 2.7
sampling:
  temperature: 0.6
  reasoning: low
  top_p: 0.95
  top_k: 20
versioning:
  resolved_at: "2026-05-07"
  snapshot: "qwen3.6-27b-autoround"
