# TerminalBench 2.1 — OR-Qwen3.6-27B passing tasks (52 of 89)
#
# Curated from observed pass results: every task here was passed at least once
# by fiz-openrouter-qwen3-6-27b on the same TB-2.1 dataset. Used for the
# local-vs-cloud Qwen comparison so we don't burn local compute on tasks
# OR-Qwen itself can't solve.
#
# The 37 excluded tasks (OR 0/N pass) are still in task-subset-tb21-all.yaml
# for full-coverage runs; revisit once we have a baseline on this subset.
#
# Each task line records OR's max passing wall in a comment so operators can
# eyeball whether the local lane's wall is in OR's neighborhood.
#
