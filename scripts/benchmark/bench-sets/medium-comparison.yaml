# terminalbench-fiz-wrapper-comparison-2026-05-06.
id: medium-comparison
framework: terminal-bench
dataset: terminal-bench-2-1
default_reps: 1
description: >-
  Full medium-model fiz-wrapper comparison across Claude, Codex, pi,
  opencode, and the matching OpenRouter provider lanes on the 15-task
