# Spec: docs/helix/02-design/plan-2026-05-15-benchmark-runner-simplification.md (PR 1b)
#
# This bench-set is the curated 15-task slice used by the medium-model
# comparison recipe (Claude Sonnet 4.6, Codex GPT-5.4-mini, pi, opencode,
