# Controlled vocabulary for the internal benchmark corpus.
#
# Adding a tag here is the only path to using it in corpus.yaml. Tags are
# either kind=capability (the bead exemplifies a capability we want the
# agent to demonstrate) or kind=failure_mode (the bead is in the corpus
# specifically because the agent has failed at this kind of task). Both
# are valuable; the corpus tracks both.
version: 1
tags:
  - id: sampling-resolver-cli-wiring
    area: cli
    kind: capability
    description: |
      Wire ADR-007 sampling resolver across CLI flags, provider seam, and
      session telemetry. Exercises end-to-end plumbing and structured
      log emission.

  - id: openai-flavor-thinking-leak
    area: provider
    kind: failure_mode
    description: |
      Provider-wire layer leaks reasoning/thinking field on fixed-variant
      models that should not advertise reasoning. Caught only by
      wire-level regression tests.

  - id: tool-loop-detection
    area: harness
    kind: failure_mode
    description: |
      Agent tool-call loop without forward progress (rereads same files,
      retries identical edits). Diagnostic for harness saturation cliffs.

  - id: manifest-additive-evolution
    area: catalog
    kind: capability
    description: |
      Extend the model catalog manifest schema additively (new fields
      surface without breaking older consumers). Exercises schema
      versioning + back-compat tests.

  - id: routing-strategy-coverage
    area: routing
    kind: capability
    description: |
      Routing strategy/disqualification path coverage — adding a new
      candidate filter or scorer wire-up that must respect ordering and
      negative-path tests.

  - id: prompt-preset-overhead
    area: prompt
    kind: capability
    description: |
      Prompt/preset surface changes — adding or renaming presets, with
      back-compat aliases or warnings. Touches prompt resolver, config,
      docs, and CHANGELOG together.

  - id: beadbench-harness-instrumentation
    area: harness
    kind: capability
    description: |
      Beadbench preflight / phase-specific verification / artifact
      capture changes. Reference task for harness parity comparison
      against external harnesses (Claude Code, codex).
