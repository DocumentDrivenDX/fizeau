baseURL: https://DocumentDrivenDX.github.io/ddx/
languageCode: en-us
title: DDx — Document-Driven Development

module:
  imports:
    - path: github.com/imfing/hextra

enableRobotsTXT: true
enableGitInfo: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - name: Docs
      pageRef: /docs
      weight: 1
    - name: Concepts
      pageRef: /docs/concepts
      weight: 2
    - name: CLI Reference
      pageRef: /docs/cli
      weight: 3
    - name: Skills
      pageRef: /docs/skills
      weight: 4
    - name: Plugins
      pageRef: /docs/plugins
      weight: 5
    - name: GitHub
      url: https://github.com/DocumentDrivenDX/ddx
      weight: 10
      params:
        icon: github

params:
  description: Tools for maintaining the documents that drive AI agents to build software.

  navbar:
    displayTitle: true
    displayLogo: false

  page:
    width: wide

  footer:
    displayCopyright: true
    displayPoweredBy: false

  editURL:
    enable: true
    base: https://github.com/DocumentDrivenDX/ddx/edit/main/website/content
