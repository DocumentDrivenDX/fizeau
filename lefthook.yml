pre-commit:
  parallel: true
  commands:
    fmt:
      run: make fmt-check
    vet:
      run: make vet

pre-push:
  parallel: false
  commands:
    build:
      run: make build-ci
    vet:
      run: make vet
    contract004-import-lint:
      run: make contract004-import-lint
    lint:
      run: make lint-go
    gosec:
      run: make gosec
    govulncheck:
      run: make govulncheck
    fmt:
      run: make fmt-check
    test:
      run: make test-no-race
    test-race:
      run: make test-race
